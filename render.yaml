services:
  - type: web
    name: wisepenny
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: wisepenny-alerts@example.com
      - key: SMTP_TO
        value: user@example.com
